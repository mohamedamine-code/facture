<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facture</title>
    <link rel="stylesheet" href="style-facture.css">
</head>
<body>
    <div class="btn-retour">
        <a class="back" href="/facteur de blar/formulair-GardeCorps.html" onclick="reset()">Retour</a>
    </div>
    
    <div class="container">
        <div class="title"><h1>Facture des Commandes</h1></div>
        <header>
            <div class="header-nav">
                <div class="box-img">
                    <img src="/WhatsApp_Image_2024-12-01_at_20.17.02_7787f2fb-removebg-preview.png" alt="">
                </div>
                <div class="txt">
                    <div class="discribtion">
                        <h4>Bg Alum</h4>
                        <h5>Mounir Bchir</h5>
                        <p>Mensieur Aluminum - Cuisine - Dressing - Décoration</p>
                    </div>
                </div>
            </div>
            <div class="break"></div>
        </header>

        <div class="main-creatur">
            <div class="creature">
                <h6>BG ALUM</h6>
                <p>Zarzis</p>
            </div>
            <div class="custommer"></div>
        </div>

        <!-- Orders Table -->
        <table id="orders-table">
            <thead>
                <tr class="header">
                    <th>Nbre</th>
                    <th>Type d'objet</th>
                    <th>Metrage (m)</th>
                    <th>Type</th>
                    <th>Couleur</th>
                    <th>Remiz</th>
                    <th>Prix Total (TND)</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <!-- Total Price Table -->
        <div class="center">
        <table id="summary-table">
            <thead>
                <tr class="header">
                    <th id="label">Prix Total (TND):</th>
                    <th id="prixTotal">0.00</th>
                </tr>
            </thead>
        </table>

    </div>
        <div class="box-imp">
            <button class="print-button" onclick="window.print();">Imprimer la Facture</button>
            <button id="back" class="print-button" onclick="reset()">Nouvelle Facture</button>
        </div>
        
        <div class="sign">
            <p>Signature & Cachet :</p>
        </div>
    </div>

    <script>
    // Load orders and customer data from localStorage
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
let commandes_formulaires = JSON.parse(localStorage.getItem("commandes_formulaires")) || [];
let tableBody = document.getElementById("table-body");
let custommer = document.querySelector(".custommer");

// Populate customer information
commandes_formulaires.forEach(cmd => {
    let customerInfo = document.createElement("div");
    customerInfo.innerHTML = `
        <h5>Nom: ${cmd.nom}</h5>
        <h5>Prénom: ${cmd.prenom}</h5>
        <h5>Date: ${cmd.date}</h5>
    `;
    custommer.appendChild(customerInfo);
});

// Populate the orders table
commandes.forEach((cmd, index) => {
    let row = document.createElement("tr");
    row.innerHTML = `
        <td>${cmd.number}</td>
        <td>${cmd.typeObject}</td>
        <td>${cmd.Metrage}</td>
        <td>${cmd.type}</td>
        <td>${cmd.couleur}</td>
        <td>${cmd.Remiz} %</td>
        <td>${parseFloat(cmd.prixRemiz).toFixed(2)}</td>
    `;
    tableBody.appendChild(row);
});

// Calculate and display the total price
let total = commandes.reduce((acc, cmd) => acc + (parseFloat(cmd.prixRemiz) || 0), 0);
document.getElementById("prixTotal").innerText = total.toFixed(2);

// Reset functionality
function reset() {
    // Clear data in localStorage
    localStorage.removeItem("commandes");
    localStorage.removeItem("commandes_formulaires");
    // Clear table and customer information
    tableBody.innerHTML = '';
    custommer.innerHTML = '';
    window.location.href ="/facteur de blar/GardCors.html"
}

    </script>
</body>
</html>
